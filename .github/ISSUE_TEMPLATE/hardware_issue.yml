name: Hardware issue
description: Report a schematic, PCB, BOM, manufacturing, or electrical issue
title: "[Hardware] "
labels:
  - area:hardware
  - needs-triage
body:
  - type: input
    id: revision
    attributes:
      label: Hardware revision
      placeholder: "For example: v1.0"
    validations:
      required: true
  - type: input
    id: tools
    attributes:
      label: EDA tool and version
      placeholder: "For example: KiCad 9.0"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Test environment
      description: Include power supply, peripherals, measurement equipment, and operating conditions.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs, measurements, or images
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed credentials and personal information from this report.
          required: true
